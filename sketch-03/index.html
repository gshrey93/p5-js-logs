<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #111;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .back-btn {
        margin-bottom: 12px;
        z-index: 3;
        text-decoration: none;
        color: white;
        background: rgba(0, 0, 0, 0.45);
        padding: 8px 12px;
        border-radius: 999px;
      }

      #game-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.3);
        z-index: 2;
        pointer-events: none;
      }

      #game-overlay.hidden {
        display: none;
      }

      .overlay-card {
        text-align: center;
        background: rgba(255, 255, 255, 0.92);
        padding: 20px 24px;
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        pointer-events: auto;
      }

      #game-status {
        margin: 0 0 14px;
        font-size: 20px;
        font-weight: bold;
      }

      #restart-btn {
        border: none;
        border-radius: 999px;
        padding: 10px 18px;
        font-size: 14px;
        cursor: pointer;
        background: #1f7fff;
        color: white;
      }
      .wrapper {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .game-container {
        position: relative;
        z-index: 1;
      }

    </style>
  </head>
  <body>
    <div class="wrapper">
      <a href="../" class="back-btn">← Back to Gallery</a>
      <div class="game-container">
        <div id="game-overlay" class="hidden">
          <div class="overlay-card">
            <p id="game-status">Match complete</p>
            <button id="restart-btn" type="button">Restart Match</button>
          </div>
        </div>
        <main id="main"></main>
      </div>
    </div>

    <script src="sketch.js" type="module"></script>
  </body>
</html>
