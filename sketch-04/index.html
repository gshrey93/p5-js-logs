<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <meta charset="utf-8" />
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #f0f0f0;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* The p5 canvas will be a fixed background */
      canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1; /* Place it behind everything else */
      }

      /* The main container for our calculator UI */
      #ui-container {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        width: 90%;
        max-width: 500px;
        z-index: 1;
      }

      /* General styling for elements we'll create in JS */
      h3 { margin-top: 0; color: #333; }
      input, button { padding: 10px; font-size: 1rem; border-radius: 5px; border: 1px solid #ccc; }
      button { cursor: pointer; background-color: #007bff; color: white; border-color: #007bff; }
      button:hover { background-color: #0056b3; }
      button:disabled { background-color: #5a9cde; cursor: not-allowed; }
      #error-message { color: #d93025; font-size: 0.9rem; height: 1.2rem; margin-top: 5px; }
      #results { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #eee; line-height: 1.6; }

      .copy-btn {
        background-color: #6c757d;
        border-color: #6c757d;
        font-size: 0.8rem;
        padding: 5px 10px;
        margin-top: 10px;
      }
      .copy-btn:hover { background-color: #5a6268; }

      #results p { margin: 0.5rem 0; }
      #results strong { color: #333; }

      /* Back to gallery button styling */
      .back-btn {
        position: fixed;
        top: 15px;
        left: 15px;
        color: #ffffff;
        background-color: #111827;
        border: 1px solid #ffffff;
        font-weight: 700;
        text-decoration: none;
        padding: 9px 14px;
        border-radius: 6px;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
        z-index: 2;
        transition: background-color 0.2s ease;
      }

      .back-btn:hover {
        background-color: #1f2937;
      }
    </style>
  </head>
  <body>
    <main id="ui-container"></main>
    <a href="../" class="back-btn">← Back to Gallery</a>
    <script type="module" src="sketch.js"></script>
  </body>
</html>
